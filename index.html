<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoolControl Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0d1117; color: #e6edf3; }
        .glass { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-premium { background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%); transition: all 0.3s ease; }
        canvas { touch-action: none; background-color: #ffffff; border-radius: 1.5rem; }
    </style>
</head>
<body class="p-4 min-h-screen flex flex-col items-center justify-center">

    <div class="max-w-md w-full glass p-8 rounded-[2.5rem] shadow-2xl">
        <header class="text-center mb-10">
            <p id="labelComunidad" class="text-emerald-500 text-[10px] font-bold uppercase tracking-[0.2em] mb-1">Iniciando sistema...</p>
            <h1 id="tituloFinca" class="text-2xl font-800 text-white uppercase tracking-tight italic">PoolControl</h1>
        </header>
        
        <form id="piscinaForm" class="space-y-6">
            <input type="hidden" id="fincaId">

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-1 tracking-widest">Nivel pH</label>
                    <input type="number" step="0.1" id="ph" required class="w-full bg-gray-900 border border-gray-700 p-4 rounded-2xl text-white outline-none focus:ring-2 focus:ring-emerald-500" placeholder="7.2">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-1 tracking-widest">Cloro mg/L</label>
                    <input type="number" step="0.1" id="cloro" required class="w-full bg-gray-900 border border-gray-700 p-4 rounded-2xl text-white outline-none focus:ring-2 focus:ring-emerald-500" placeholder="1.5">
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-bold text-gray-500 uppercase ml-1 tracking-widest">Claridad del Agua</label>
                <select id="claridad" class="w-full bg-gray-900 border border-gray-700 p-4 rounded-2xl text-white outline-none appearance-none cursor-pointer">
                    <option value="Cristalina / Transparente">💎 Cristalina</option>
                    <option value="Ligeramente Turbia">☁️ Ligeramente Turbia</option>
                    <option value="Turbia / Opaca">🌑 Turbia / Opaca</option>
                    <option value="Muy Turbia / Algas">🌿 Muy Turbia (Aviso)</option>
                </select>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-bold text-gray-500 uppercase ml-1 tracking-widest">Técnico Operario</label>
                <input type="text" id="operario" required class="w-full bg-gray-900 border border-gray-700 p-4 rounded-2xl text-white outline-none focus:ring-2 focus:ring-emerald-500" placeholder="Tu nombre">
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-bold text-gray-500 uppercase ml-1 block text-center tracking-widest">Evidencia Foto</label>
                <input type="file" id="foto" accept="image/*" capture="camera" class="text-xs text-gray-400 w-full file:bg-emerald-500/10 file:text-emerald-500 file:border-0 file:rounded-full file:px-4 file:py-2">
            </div>

            <div class="space-y-1 text-center">
                <label class="text-[10px] font-bold text-gray-500 uppercase block tracking-widest">Firma Responsable</label>
                <canvas id="canvasFirma" class="w-full h-32"></canvas>
                <button type="button" onclick="limpiarFirma()" class="text-[9px] text-gray-600 uppercase mt-1">Borrar trazo</button>
            </div>

            <button type="submit" id="btnEnviar" class="w-full btn-premium py-5 rounded-[1.8rem] font-extrabold text-white shadow-xl flex justify-center items-center tracking-[0.2em] text-xs uppercase">
                ENVIAR PARTE PROFESIONAL
            </button>
        </form>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const fincaId = params.get('id');
        const nombreVisible = params.get('n') || "Finca Activa";
        if (fincaId) {
            document.getElementById('fincaId').value = fincaId;
            document.getElementById('tituloFinca').innerText = nombreVisible;
            document.getElementById('labelComunidad').innerText = "Unidad:";
        }

        const canvas = document.getElementById('canvasFirma');
        const ctx = canvas.getContext('2d');
        let dibujando = false;
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        ctx.lineWidth = 2.5; ctx.strokeStyle = '#000';

        const getPos = (e) => {
            const rect = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: cx - rect.left, y: cy - rect.top };
        };

        canvas.onmousedown = canvas.ontouchstart = (e) => { dibujando = true; ctx.beginPath(); const {x,y} = getPos(e); ctx.moveTo(x,y); };
        canvas.onmousemove = canvas.ontouchmove = (e) => { if(!dibujando) return; e.preventDefault(); const {x,y} = getPos(e); ctx.lineTo(x,y); ctx.stroke(); };
        window.onmouseup = window.ontouchend = () => dibujando = false;

        function limpiarFirma() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        document.getElementById('piscinaForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true; btn.innerText = "Sincronizando con Servidor...";
            
            const payload = {
                fincaId: document.getElementById('fincaId').value,
                operario: document.getElementById('operario').value,
                ph: document.getElementById('ph').value,
                cloro: document.getElementById('cloro').value,
                claridad: document.getElementById('claridad').value,
                firma: canvas.toDataURL(),
                foto: "" // Lo enviamos vacío en la primera prueba para asegurar conexión
            };

            const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbxIwkomi7VOZAGP1cmwlpO8emhqBRPQIfTjdlETSF4kqism_6v_lOLh1qNxYACkx4In/exec";

            try {
                await fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert("✅ REPORTE ENVIADO. Comprueba tu Excel.");
                location.reload();
            } catch { alert("Error de red"); btn.disabled = false; }
        };
    </script>
</body>
</html>
