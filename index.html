<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Piscina</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-2xl font-bold text-blue-600 mb-4 text-center">Control Diario</h1>
        
        <form id="piscinaForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium">Código de Finca (Token):</label>
                <input type="text" id="fincaId" required class="w-full border p-2 rounded">
            </div>

            <div>
                <label class="block text-sm font-medium">Técnico:</label>
                <input type="text" id="operario" required class="w-full border p-2 rounded">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium">pH:</label>
                    <input type="number" step="0.1" id="ph" required class="w-full border p-2 rounded">
                </div>
                <div>
                    <label class="block text-sm font-medium">Cloro (mg/L):</label>
                    <input type="number" step="0.1" id="cloro" required class="w-full border p-2 rounded">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium">Foto del Agua:</label>
                <input type="file" id="foto" accept="image/*" capture="camera" required class="w-full">
            </div>

            <div>
                <label class="block text-sm font-medium">Firma del Técnico:</label>
                <canvas id="canvasFirma" class="border w-full h-32 bg-gray-50 rounded"></canvas>
                <button type="button" onclick="limpiarFirma()" class="text-xs text-red-500 underline">Borrar firma</button>
            </div>

            <button type="submit" id="btnEnviar" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">
                ENVIAR REPORTE
            </button>
        </form>
    </div>

    <script>
        const canvas = document.getElementById('canvasFirma');
        const ctx = canvas.getContext('2d');
        let dibujando = false;

        // Lógica simple de firma
        canvas.addEventListener('mousedown', () => dibujando = true);
        canvas.addEventListener('mouseup', () => dibujando = false);
        canvas.addEventListener('mousemove', (e) => {
            if (!dibujando) return;
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.lineTo(e.offsetX, e.offsetY);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(e.offsetX, e.offsetY);
        });

        function limpiarFirma() { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.beginPath(); }

        // Envío de datos
        document.getElementById('piscinaForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.innerText = "Enviando...";

            const fotoFile = document.getElementById('foto').files[0];
            const reader = new FileReader();
            
            reader.onloadend = async () => {
                const payload = {
                    fincaId: document.getElementById('fincaId').value,
                    operario: document.getElementById('operario').value,
                    ph: document.getElementById('ph').value,
                    cloro: document.getElementById('cloro').value,
                    temp: "25", // Ejemplo fijo
                    claridad: "Limpia", // Ejemplo fijo
                    firma: canvas.toDataURL(),
                    foto: reader.result
                };

                // AQUÍ USAMOS TU URL
                const url = "https://script.google.com/macros/s/AKfycbzM2WfD8FNIq3vbeZsIpvPV6LxtxHia9lZ0syPGSTSA5KO3Qy3kObafLwx9pVYre_X8/exec";

                try {
                    await fetch(url, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(payload)
                    });
                    alert("✅ ¡Enviado con éxito!");
                    location.reload();
                } catch (error) {
                    alert("Error al enviar");
                    btn.disabled = false;
                }
            };
            reader.readAsDataURL(fotoFile);
        };
    </script>
</body>
</html>
