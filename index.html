<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoolControl Pro - Registro Técnico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkNvbnRyb2wgZGUgUGlzY2luYXMiLAogICJzaG9ydF9uYW1lIjogIlBpc2NpbmFQcm8iLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzBkMTExNyIsCiAgInRoZW1lX2NvbG9yIjogIiMxMGI5ODEiCn0=">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0d1117; color: #e6edf3; }
        .glass { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-premium { background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-premium:active { transform: scale(0.98); opacity: 0.9; }
        canvas { touch-action: none; background-color: #ffffff; cursor: crosshair; }
        input, select { -webkit-appearance: none; }
    </style>
</head>
<body class="p-4 min-h-screen flex flex-col items-center justify-center">

    <button id="installBtn" class="hidden mb-6 px-6 py-2.5 bg-gray-800 text-emerald-400 border border-emerald-500/20 rounded-full text-xs font-extrabold shadow-lg flex items-center gap-2 tracking-widest uppercase">
        📥 Instalar App Profesional
    </button>

    <div class="max-w-md w-full glass p-8 rounded-[2.5rem] shadow-2xl border border-white/5">
        <header class="text-center mb-10">
            <div id="badge" class="inline-block px-3 py-1 bg-emerald-500/10 rounded-full mb-3">
                <p id="labelComunidad" class="text-emerald-500 text-[10px] font-bold uppercase tracking-[0.25em]">Sincronizando...</p>
            </div>
            <h1 id="tituloFinca" class="text-3xl font-800 tracking-tighter text-white uppercase leading-none">Cargando Finca</h1>
        </header>
        
        <form id="piscinaForm" class="space-y-6">
            <input type="hidden" id="fincaId">

            <div class="grid grid-cols-2 gap-5">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Nivel pH</label>
                    <input type="number" step="0.1" id="ph" required class="w-full bg-gray-900/60 border border-gray-700/50 p-4 rounded-2xl focus:ring-2 focus:ring-emerald-500 text-white outline-none transition-all placeholder-gray-600" placeholder="7.2">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Cloro mg/L</label>
                    <input type="number" step="0.1" id="cloro" required class="w-full bg-gray-900/60 border border-gray-700/50 p-4 rounded-2xl focus:ring-2 focus:ring-emerald-500 text-white outline-none transition-all placeholder-gray-600" placeholder="1.5">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Estado de Claridad</label>
                <div class="relative">
                    <select id="claridad" class="w-full bg-gray-900/60 border border-gray-700/50 p-4 rounded-2xl focus:ring-2 focus:ring-emerald-500 text-white outline-none appearance-none cursor-pointer">
                        <option value="Cristalina / Transparente">💎 Cristalina / Transparente</option>
                        <option value="Ligeramente Turbia">☁️ Ligeramente Turbia</option>
                        <option value="Turbia / Opaca">🌑 Turbia / Opaca</option>
                        <option value="Muy Turbia / Algas">🌿 Muy Turbia (Aviso Urgente)</option>
                    </select>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Técnico Operario</label>
                <input type="text" id="operario" required class="w-full bg-gray-900/60 border border-gray-700/50 p-4 rounded-2xl focus:ring-2 focus:ring-emerald-500 text-white outline-none transition-all" placeholder="Nombre completo">
            </div>

            <div class="space-y-3">
                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest text-center block">Evidencia Visual</label>
                <div class="flex justify-center">
                    <input type="file" id="foto" accept="image/*" capture="camera" required class="text-xs text-gray-500 file:mr-4 file:py-2.5 file:px-6 file:rounded-full file:border-0 file:bg-emerald-500/10 file:text-emerald-500 file:font-bold hover:file:bg-emerald-500/20 cursor-pointer transition-all">
                </div>
            </div>

            <div class="space-y-3">
                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest text-center block">Firma Responsable</label>
                <div class="bg-white rounded-3xl overflow-hidden shadow-inner p-1">
                    <canvas id="canvasFirma" class="w-full h-32 rounded-2xl"></canvas>
                </div>
                <button type="button" onclick="limpiarFirma()" class="w-full text-[9px] text-gray-600 font-bold uppercase tracking-widest py-1">Limpiar Trazo</button>
            </div>

            <button type="submit" id="btnEnviar" class="w-full btn-premium py-5 rounded-[1.8rem] font-extrabold text-white shadow-2xl flex justify-center items-center tracking-[0.15em] text-xs uppercase border border-white/10">
                Finalizar Reporte Diario
            </button>
        </form>
    </div>

    <script>
        // 1. Lógica de Personalización por URL
        const params = new URLSearchParams(window.location.search);
        const fincaId = params.get('id'); 
        const nombreVisible = params.get('n') || "Finca No Identificada";

        if (fincaId) {
            document.getElementById('fincaId').value = fincaId;
            document.getElementById('tituloFinca').innerText = nombreVisible;
            document.getElementById('labelComunidad').innerText = "Unidad de Control:";
        } else {
            document.getElementById('tituloFinca').innerText = "Acceso Denegado";
            document.getElementById('piscinaForm').innerHTML = "<p class='text-center text-red-400 py-10'>Error: Se requiere QR de comunidad.</p>";
        }

        // 2. Lógica de Firma (Canvas)
        const canvas = document.getElementById('canvasFirma');
        const ctx = canvas.getContext('2d');
        let dibujando = false;
        
        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.strokeStyle = '#000000';
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const getPos = (e) => {
            const rect = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: cx - rect.left, y: cy - rect.top };
        };

        const start = (e) => { dibujando = true; ctx.beginPath(); const {x,y} = getPos(e); ctx.moveTo(x,y); };
        const move = (e) => { if(!dibujando) return; e.preventDefault(); const {x,y} = getPos(e); ctx.lineTo(x,y); ctx.stroke(); };
        
        canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move);
        window.addEventListener('mouseup', () => dibujando = false);
        canvas.addEventListener('touchstart', start); canvas.addEventListener('touchmove', move);

        function limpiarFirma() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        // 3. Service Worker e Instalación
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
        let dp;
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); dp = e; document.getElementById('installBtn').classList.remove('hidden'); });
        document.getElementById('installBtn').addEventListener('click', () => { if(dp){ dp.prompt(); dp = null; } });

        // 4. Envío de Datos (URL ACTUALIZADA)
        document.getElementById('piscinaForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true; btn.innerText = "PROCESANDO ENVÍO...";
            
            const reader = new FileReader();
            reader.readAsDataURL(document.getElementById('foto').files[0]);
            reader.onloadend = async () => {
                const payload = {
                    fincaId: document.getElementById('fincaId').value,
                    operario: document.getElementById('operario').value,
                    ph: document.getElementById('ph').value,
                    cloro: document.getElementById('cloro').value,
                    temp: "N/A",
                    claridad: document.getElementById('claridad').value,
                    firma: canvas.toDataURL(),
                    foto: reader.result
                };

                const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbTuUX9OmDsd-hZZkuxYGi3p59LrvSp8HYgsUK5Xx1SFKtjzMM4ptzrvD8R4Pj6FRZX/exec";

                try {
                    await fetch(WEB_APP_URL, { 
                        method: 'POST', 
                        mode: 'no-cors', 
                        body: JSON.stringify(payload) 
                    });
                    alert("✅ REPORTE ENVIADO AL ADMINISTRADOR");
                    location.reload();
                } catch (err) {
                    alert("Error de conexión");
                    btn.disabled = false; btn.innerText = "REINTENTAR ENVÍO";
                }
            };
        };
    </script>
</body>
</html>
