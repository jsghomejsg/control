<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PoolControl Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background-color: #111827; color: white; font-family: sans-serif; }
.input-field { background-color: #1f2937; border: 2px solid #374151; color: white; padding: 15px; border-radius: 12px; width: 100%; font-size: 16px; outline: none; }
.input-field:focus { border-color: #10b981; }
canvas { background-color: white; border-radius: 12px; touch-action: none; border: 2px solid #374151; }
.btn-send { background: #10b981; color: white; font-weight: bold; padding: 18px; border-radius: 12px; width: 100%; text-transform: uppercase; margin-top: 10px; }
</style>
</head>
<body class="p-4">

<div class="max-w-md mx-auto space-y-6">
<header class="text-center py-4">
<h1 id="tituloFinca" class="text-2xl font-bold text-emerald-400 uppercase">PoolControl</h1>
<p id="labelComunidad" class="text-gray-400 text-sm">Registro Técnico</p>
</header>

<form id="piscinaForm" class="space-y-4">
<input type="hidden" id="fincaId">

<div class="grid grid-cols-2 gap-4">
<div>
<label class="block text-xs font-bold mb-1 text-gray-400">PH</label>
<input type="number" step="0.1" id="ph" required class="input-field" placeholder="7.2">
</div>
<div>
<label class="block text-xs font-bold mb-1 text-gray-400">CLORO</label>
<input type="number" step="0.1" id="cloro" required class="input-field" placeholder="1.5">
</div>
</div>

<div>
<label class="block text-xs font-bold mb-1 text-gray-400">NOMBRE DEL TÉCNICO</label>
<input type="text" id="operario" required class="input-field" placeholder="Tu nombre">
</div>

<div class="space-y-2">
<label class="block text-xs font-bold text-center text-gray-400 uppercase tracking-widest">Firma obligatoria</label>
<canvas id="canvasFirma" class="w-full h-40"></canvas>
<button type="button" onclick="limpiarFirma()" class="w-full text-xs text-gray-500 uppercase py-2">Borrar Firma</button>
</div>

<button type="submit" id="btnEnviar" class="btn-send shadow-lg">
Enviar Reporte Ahora
</button>
</form>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const fincaId = params.get('id');
const nombreVisible = params.get('n') || "Finca Activa";

if (fincaId) {
document.getElementById('fincaId').value = fincaId;
document.getElementById('tituloFinca').innerText = nombreVisible;
}

const canvas = document.getElementById('canvasFirma');
const ctx = canvas.getContext('2d');
let dibujando = false;

// Ajustar tamaño del canvas al cargar
canvas.width = canvas.offsetWidth;
canvas.height = canvas.offsetHeight;

const getPos = (e) => {
const rect = canvas.getBoundingClientRect();
const clientX = e.touches ? e.touches[0].clientX : e.clientX;
const clientY = e.touches ? e.touches[0].clientY : e.clientY;
return { x: clientX - rect.left, y: clientY - rect.top };
};

const empezarDibujo = (e) => {
dibujando = true;
ctx.beginPath();
const pos = getPos(e);
ctx.moveTo(pos.x, pos.y);
};

const dibujar = (e) => {
if (!dibujando) return;
e.preventDefault();
const pos = getPos(e);
ctx.lineTo(pos.x, pos.y);
ctx.lineWidth = 3;
ctx.lineCap = "round";
ctx.strokeStyle = "#000";
ctx.stroke();
};

canvas.addEventListener('mousedown', empezarDibujo);
canvas.addEventListener('touchstart', empezarDibujo);
canvas.addEventListener('mousemove', dibujar);
canvas.addEventListener('touchmove', dibujar, { passive: false });
window.addEventListener('mouseup', () => dibujando = false);
window.addEventListener('touchend', () => dibujando = false);

function limpiarFirma() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

document.getElementById('piscinaForm').onsubmit = async (e) => {
e.preventDefault();
const btn = document.getElementById('btnEnviar');
btn.disabled = true;
btn.innerText = "ENVIANDO DATOS...";

const payload = {
fincaId: document.getElementById('fincaId').value,
operario: document.getElementById('operario').value,
ph: document.getElementById('ph').value,
cloro: document.getElementById('cloro').value,
firma: canvas.toDataURL()
};

const URL_SCRIPT = "https://script.google.com/macros/s/AKfycby-WnWXtzlQlgblZqqkzpBQ9ZHR0aIe-8LHI3UxRf6WZqUI8mo4QkKPZHh_gQffxC6Ahw/exec";

try {
await fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
alert("✅ REGISTRO RECIBIDO");
location.reload();
} catch (err) {
alert("Error de conexión");
btn.disabled = false;
btn.innerText = "REINTENTAR";
}
};
</script>
</body>
</html>
