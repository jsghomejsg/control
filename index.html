<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoolControl Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0d1117; color: #e6edf3; }
        .glass { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-premium { background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%); transition: all 0.3s ease; }
        canvas { touch-action: none; background-color: #ffffff; }
    </style>
</head>
<body class="p-4 min-h-screen flex flex-col items-center justify-center">

    <button id="installBtn" class="hidden mb-6 px-6 py-2 bg-gray-800 text-emerald-400 border border-emerald-500/30 rounded-full text-xs font-bold shadow-lg flex items-center gap-2">
        📥 INSTALAR APP EN ESTE MÓVIL
    </button>

    <div class="max-w-md w-full glass p-8 rounded-[2.5rem] shadow-2xl">
        <header class="text-center mb-8">
            <p id="labelComunidad" class="text-emerald-500 text-[10px] font-bold uppercase tracking-[0.2em] mb-1">Cargando...</p>
            <h1 id="tituloFinca" class="text-2xl font-800 tracking-tight text-white uppercase">SISTEMA DE CONTROL</h1>
        </header>
        
        <form id="piscinaForm" class="space-y-6">
            <input type="hidden" id="fincaId">

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Nivel pH</label>
                    <input type="number" step="0.1" id="ph" required class="w-full bg-gray-900/50 border border-gray-700 p-4 rounded-2xl focus:ring-2 focus:ring-emerald-500 text-white outline-none" placeholder="7.2">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Cloro mg/L</label>
                    <input type="number" step="0.1" id="cloro" required class="w-full bg-gray-900/50 border border-gray-700 p-4 rounded-2xl focus:ring-2 focus:ring-emerald-500 text-white outline-none" placeholder="1.5">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Claridad del Agua</label>
                <select id="claridad" class="w-full bg-gray-900/50 border border-gray-700 p-4 rounded-2xl focus:ring-2 focus:ring-emerald-500 text-white outline-none appearance-none cursor-pointer">
                    <option value="Cristalina / Transparente">💎 Cristalina / Transparente</option>
                    <option value="Ligeramente Turbia">☁️ Ligeramente Turbia</option>
                    <option value="Turbia / Opaca">🌑 Turbia / Opaca</option>
                    <option value="Muy Turbia / Algas">🌿 Muy Turbia (Aviso Urgente)</option>
                </select>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Técnico de Turno</label>
                <input type="text" id="operario" required class="w-full bg-gray-900/50 border border-gray-700 p-4 rounded-2xl focus:ring-2 focus:ring-emerald-500 text-white outline-none" placeholder="Nombre completo">
            </div>

            <div class="space-y-2 text-center">
                <label class="text-[10px] font-bold text-gray-500 uppercase mb-2 block">Evidencia Visual</label>
                <input type="file" id="foto" accept="image/*" capture="camera" required class="text-xs text-gray-400 file:mr-4 file:py-2 file:px-6 file:rounded-full file:border-0 file:bg-emerald-600/10 file:text-emerald-500 file:font-bold cursor-pointer">
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-bold text-gray-500 uppercase text-center block">Firma Digital Responsable</label>
                <div class="bg-white rounded-3xl overflow-hidden shadow-inner">
                    <canvas id="canvasFirma" class="w-full h-32"></canvas>
                </div>
                <button type="button" onclick="limpiarFirma()" class="w-full text-[9px] text-gray-600 mt-1 uppercase">Limpiar trazo</button>
            </div>

            <button type="submit" id="btnEnviar" class="w-full btn-premium py-5 rounded-[1.5rem] font-bold text-white shadow-2xl flex justify-center items-center tracking-widest text-sm">
                ENVIAR REPORTE DIARIO
            </button>
        </form>
    </div>

    <script>
        // Lógica para detectar la Comunidad por URL
        const params = new URLSearchParams(window.location.search);
        const fincaId = params.get('id'); // Ej: ?id=Prueba
        const nombreVisible = params.get('n') || "Comunidad Activa"; // Ej: &n=Comunidad%20Prueba

        if (fincaId) {
            document.getElementById('fincaId').value = fincaId;
            document.getElementById('tituloFinca').innerText = nombreVisible;
            document.getElementById('labelComunidad').innerText = "Gestión Digital de:";
        } else {
            document.getElementById('labelComunidad').innerText = "Error:";
            document.getElementById('tituloFinca').innerText = "Sin Identificador";
        }

        // Lógica del Canvas y Firma
        const canvas = document.getElementById('canvasFirma');
        const ctx = canvas.getContext('2d');
        let dibujando = false;
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';

        const obtenerCoords = (e) => {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        };

        const empezar = (e) => { dibujando = true; ctx.beginPath(); const {x,y} = obtenerCoords(e); ctx.moveTo(x,y); };
        const mover = (e) => { if(!dibujando) return; const {x,y} = obtenerCoords(e); ctx.lineTo(x,y); ctx.stroke(); };
        
        canvas.addEventListener('mousedown', empezar); canvas.addEventListener('mousemove', mover);
        window.addEventListener('mouseup', () => dibujando = false);
        canvas.addEventListener('touchstart', empezar); canvas.addEventListener('touchmove', (e) => { e.preventDefault(); mover(e); });

        function limpiarFirma() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        // Botón Instalar (PWA)
        let dp;
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); dp = e; document.getElementById('installBtn').classList.remove('hidden'); });
        document.getElementById('installBtn').addEventListener('click', () => { if(dp){ dp.prompt(); dp = null; } });

        // Envío
        document.getElementById('piscinaForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true; btn.innerText = "ENVIANDO REPORTE...";
            
            const reader = new FileReader();
            reader.readAsDataURL(document.getElementById('foto').files[0]);
            reader.onloadend = async () => {
                const payload = {
                    fincaId: document.getElementById('fincaId').value,
                    operario: document.getElementById('operario').value,
                    ph: document.getElementById('ph').value,
                    cloro: document.getElementById('cloro').value,
                    temp: "N/A",
                    claridad: document.getElementById('claridad').value,
                    firma: canvas.toDataURL(),
                    foto: reader.result
                };
                try {
                    await fetch("https://script.google.com/macros/s/AKfycbzM2WfD8FNIq3vbeZsIpvPV6LxtxHia9lZ0syPGSTSA5KO3Qy3kObafLwx9pVYre_X8/exec", { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    alert("✅ REGISTRO COMPLETADO");
                    location.reload();
                } catch { alert("Error"); btn.disabled = false; }
            };
        };
    </script>
</body>
</html>
